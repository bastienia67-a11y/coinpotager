<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Aménagement de terrasse">
  <defs>
    <linearGradient id="bg-ter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c0654a"/>
      <stop offset="1" stop-color="#8f4533"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a4836"/>
      <stop offset="1" stop-color="#3a2e22"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-ter)"/>
  <circle cx="100" cy="100" r="70" fill="#d99a3a" opacity="0.4"/>
  <!-- lames de terrasse -->
  <rect y="300" width="600" height="100" fill="url(#sol)"/>
  <g stroke="#f6f1e7" stroke-width="1.5" opacity="0.18">
    <line x1="0" y1="326" x2="600" y2="326"/>
    <line x1="0" y1="352" x2="600" y2="352"/>
    <line x1="0" y1="378" x2="600" y2="378"/>
    <line x1="100" y1="300" x2="100" y2="400"/>
    <line x1="200" y1="300" x2="200" y2="400"/>
    <line x1="300" y1="300" x2="300" y2="400"/>
    <line x1="400" y1="300" x2="400" y2="400"/>
    <line x1="500" y1="300" x2="500" y2="400"/>
  </g>
  <!-- table ronde -->
  <ellipse cx="290" cy="280" rx="70" ry="22" fill="#46382b" opacity="0.9"/>
  <rect x="282" y="282" width="16" height="30" rx="4" fill="#3a2e22"/>
  <!-- chaises -->
  <g fill="#46382b">
    <rect x="170" y="250" width="60" height="50" rx="8" fill="#5a4836"/>
    <rect x="170" y="224" width="60" height="32" rx="6" fill="#46382b"/>
    <rect x="175" y="300" width="10" height="18" rx="3"/>
    <rect x="215" y="300" width="10" height="18" rx="3"/>
    <rect x="370" y="250" width="60" height="50" rx="8" fill="#5a4836"/>
    <rect x="370" y="224" width="60" height="32" rx="6" fill="#46382b"/>
    <rect x="375" y="300" width="10" height="18" rx="3"/>
    <rect x="415" y="300" width="10" height="18" rx="3"/>
  </g>
  <!-- pot avec plante -->
  <g transform="translate(490,240)">
    <path d="M0 0 q-22 -44 -6 -76 q20 26 6 76 Z" fill="#bcd9b0"/>
    <path d="M0 0 q22 -44 6 -76 q-20 26 -6 76 Z" fill="#8aab78"/>
    <path d="M-18 0 L18 0 L12 52 L-12 52 Z" fill="#46382b"/>
  </g>
  <!-- guirlande -->
  <path d="M30 70 Q300 140 570 70" fill="none" stroke="#f6f1e7" stroke-width="2" opacity="0.45"/>
  <g fill="#d99a3a">
    <circle cx="110" cy="104" r="5"/><circle cx="200" cy="118" r="5"/>
    <circle cx="300" cy="122" r="5"/><circle cx="400" cy="116" r="5"/>
    <circle cx="490" cy="100" r="5"/>
  </g>
  <!-- verre sur table -->
  <g transform="translate(270,255)" fill="#f6f1e7" opacity="0.7">
    <path d="M-8 0 L8 0 L5 28 L-5 28 Z"/>
    <ellipse cx="0" cy="0" rx="9" ry="4"/>
    <ellipse cx="0" cy="28" rx="6" ry="3"/>
  </g>
</svg>
