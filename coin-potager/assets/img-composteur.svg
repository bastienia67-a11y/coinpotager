<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Composteur de jardin">
  <defs>
    <linearGradient id="bg-comp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a8f5e"/>
      <stop offset="1" stop-color="#3d5a3d"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-comp)"/>
  <circle cx="500" cy="320" r="110" fill="#ffffff" opacity="0.05"/>
  <circle cx="60" cy="80" r="80" fill="#ffffff" opacity="0.06"/>
  <!-- bac composteur -->
  <rect x="180" y="150" width="200" height="200" rx="8" fill="#46382b"/>
  <!-- planches horizontales -->
  <g fill="#5a4836" stroke="#3a2e22" stroke-width="1">
    <rect x="180" y="150" width="200" height="34" rx="4"/>
    <rect x="180" y="190" width="200" height="34"/>
    <rect x="180" y="230" width="200" height="34"/>
    <rect x="180" y="270" width="200" height="34"/>
    <rect x="180" y="310" width="200" height="40" rx="0 0 4 4"/>
  </g>
  <!-- fentes aération -->
  <g fill="#3a2e22">
    <rect x="210" y="157" width="6" height="20" rx="3"/>
    <rect x="240" y="157" width="6" height="20" rx="3"/>
    <rect x="270" y="157" width="6" height="20" rx="3"/>
    <rect x="300" y="157" width="6" height="20" rx="3"/>
    <rect x="330" y="157" width="6" height="20" rx="3"/>
    <rect x="360" y="157" width="6" height="20" rx="3"/>
  </g>
  <!-- couvercle -->
  <rect x="170" y="138" width="220" height="22" rx="6" fill="#3d5a3d"/>
  <rect x="260" y="130" width="40" height="16" rx="5" fill="#2c4426"/>
  <!-- déchets qui entrent -->
  <g fill="#bcd9b0" opacity="0.85">
    <path d="M310 110 q10 -28 24 -20 q-4 18 -24 20 Z"/>
    <path d="M290 105 q-8 -32 -22 -22 q6 20 22 22 Z"/>
    <path d="M300 108 q0 -30 -8 -40 q-12 18 8 40 Z"/>
  </g>
  <!-- ver de terre décoratif -->
  <path d="M420 280 q20 -10 30 5 q10 15 -5 22 q-18 8 -28 -4" fill="none" stroke="#d99a3a" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- petites feuilles sol -->
  <g fill="#bcd9b0" opacity="0.6">
    <path d="M130 350 q-14 -20 -4 -38 q14 14 4 38 Z"/>
    <path d="M150 355 q4 -22 18 -28 q-2 20 -18 28 Z"/>
    <path d="M430 360 q-16 -18 -6 -34 q12 12 6 34 Z"/>
  </g>
</svg>
