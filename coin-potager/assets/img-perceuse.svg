<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Perceuse-visseuse sans fil">
  <defs>
    <linearGradient id="bg-per" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d99a3a"/>
      <stop offset="1" stop-color="#a8701f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-per)"/>
  <circle cx="80" cy="80" r="100" fill="#ffffff" opacity="0.06"/>
  <circle cx="530" cy="340" r="90" fill="#ffffff" opacity="0.05"/>
  <!-- corps de la perceuse -->
  <g transform="translate(300,200) rotate(-15)">
    <!-- mèche -->
    <rect x="80" y="-6" width="100" height="12" rx="4" fill="#f6f1e7"/>
    <polygon points="180,-8 196,0 180,8" fill="#f6f1e7"/>
    <!-- mandrin -->
    <rect x="50" y="-18" width="36" height="36" rx="6" fill="#3a2e22"/>
    <circle cx="68" cy="0" r="10" fill="#46382b"/>
    <!-- corps principal -->
    <rect x="-60" y="-28" width="115" height="56" rx="14" fill="#46382b"/>
    <!-- détail bouton -->
    <circle cx="-10" cy="0" r="10" fill="#c0654a"/>
    <rect x="-50" y="-20" width="30" height="12" rx="4" fill="#5a4836"/>
    <!-- poignée -->
    <path d="M-30 28 L-20 90 Q-16 106 2 106 L20 106 Q36 106 38 90 L42 28 Z" fill="#3a2e22"/>
    <!-- batterie -->
    <rect x="-22" y="100" width="60" height="26" rx="8" fill="#d99a3a"/>
    <rect x="-14" y="108" width="8" height="10" rx="2" fill="#46382b"/>
    <rect x="2" y="108" width="8" height="10" rx="2" fill="#46382b"/>
    <rect x="18" y="108" width="8" height="10" rx="2" fill="#46382b"/>
  </g>
  <!-- vis décoratives -->
  <g fill="#f6f1e7" opacity="0.4">
    <circle cx="130" cy="300" r="12"/>
    <line x1="118" y1="300" x2="142" y2="300" stroke="#d99a3a" stroke-width="3"/>
    <line x1="130" y1="288" x2="130" y2="312" stroke="#d99a3a" stroke-width="3"/>
    <circle cx="460" cy="120" r="10"/>
    <line x1="450" y1="120" x2="470" y2="120" stroke="#d99a3a" stroke-width="3"/>
    <line x1="460" y1="110" x2="460" y2="130" stroke="#d99a3a" stroke-width="3"/>
  </g>
</svg>
