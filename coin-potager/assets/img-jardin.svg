<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="Illustration de jardin">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcd9b0"/>
      <stop offset="1" stop-color="#e8dfcd"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a8f5e"/>
      <stop offset="1" stop-color="#3d5a3d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="url(#sky)"/>
  <circle cx="660" cy="80" r="46" fill="#d99a3a" opacity="0.85"/>
  <!-- collines -->
  <path d="M0 250 Q200 200 400 240 T800 230 V360 H0 Z" fill="#8aab78" opacity="0.6"/>
  <path d="M0 290 Q250 250 500 285 T800 280 V360 H0 Z" fill="url(#ground)"/>
  <!-- rangées de potager -->
  <g opacity="0.9">
    <ellipse cx="160" cy="320" rx="120" ry="20" fill="#2c4426"/>
    <ellipse cx="430" cy="335" rx="150" ry="22" fill="#2c4426"/>
    <ellipse cx="680" cy="325" rx="120" ry="20" fill="#2c4426"/>
  </g>
  <!-- plants -->
  <g fill="#3d5a3d">
    <path d="M120 320 q-8 -40 0 -70 q12 26 0 70 Z"/>
    <path d="M150 320 q-8 -50 4 -82 q10 30 -4 82 Z"/>
    <path d="M180 320 q4 -44 -2 -72 q14 30 2 72 Z"/>
  </g>
  <!-- tomates -->
  <g>
    <circle cx="410" cy="300" r="10" fill="#c0654a"/>
    <circle cx="440" cy="312" r="10" fill="#c0654a"/>
    <circle cx="425" cy="285" r="9" fill="#c0654a"/>
    <path d="M400 300 q20 -50 40 0" fill="none" stroke="#3d5a3d" stroke-width="4"/>
  </g>
  <!-- arrosoir stylisé -->
  <g transform="translate(620,250)" fill="#46382b">
    <rect x="0" y="20" width="60" height="40" rx="8"/>
    <path d="M60 30 l30 -10 l4 8 l-30 12 Z"/>
    <path d="M10 20 q20 -22 40 0" fill="none" stroke="#46382b" stroke-width="6"/>
  </g>
</svg>
