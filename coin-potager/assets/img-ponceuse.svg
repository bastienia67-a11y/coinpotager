<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Ponceuse électrique">
  <defs>
    <linearGradient id="bg-pon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a7a6a"/>
      <stop offset="1" stop-color="#3d5a3d"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-pon)"/>
  <circle cx="500" cy="80" r="120" fill="#ffffff" opacity="0.05"/>
  <circle cx="80" cy="340" r="90" fill="#ffffff" opacity="0.06"/>
  <!-- ponceuse excentrique -->
  <g transform="translate(300,190)">
    <!-- semelle ronde -->
    <circle cx="0" cy="70" r="68" fill="#3a2e22"/>
    <circle cx="0" cy="70" r="58" fill="#46382b"/>
    <!-- papier de verre (texture) -->
    <circle cx="0" cy="70" r="55" fill="none" stroke="#5a4836" stroke-width="2" stroke-dasharray="6 4"/>
    <!-- corps -->
    <rect x="-55" y="-20" width="110" height="95" rx="18" fill="#46382b"/>
    <!-- poignée supérieure -->
    <rect x="-22" y="-52" width="44" height="38" rx="14" fill="#3a2e22"/>
    <!-- bouton on/off -->
    <circle cx="0" cy="-36" r="12" fill="#c0654a"/>
    <circle cx="0" cy="-36" r="6" fill="#9a3a28"/>
    <!-- aération -->
    <g stroke="#5a4836" stroke-width="2.5">
      <line x1="-40" y1="10" x2="-40" y2="55"/>
      <line x1="-28" y1="6" x2="-28" y2="58"/>
      <line x1="-16" y1="4" x2="-16" y2="60"/>
      <line x1="-4" y1="3" x2="-4" y2="62"/>
      <line x1="8" y1="4" x2="8" y2="60"/>
      <line x1="20" y1="6" x2="20" y2="58"/>
      <line x1="32" y1="8" x2="32" y2="56"/>
    </g>
    <!-- câble -->
    <path d="M0 -52 Q-40 -90 -80 -70" fill="none" stroke="#3a2e22" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- copeaux de bois -->
  <g fill="#d99a3a" opacity="0.5">
    <path d="M160 310 q20 -6 24 8 q-16 4 -24 -8 Z"/>
    <path d="M180 330 q18 -8 24 6 q-18 2 -24 -6 Z"/>
    <path d="M420 280 q-18 -8 -22 8 q14 6 22 -8 Z"/>
    <path d="M440 300 q-16 -10 -20 6 q16 4 20 -6 Z"/>
  </g>
  <!-- planche de bois -->
  <rect x="100" y="340" width="400" height="28" rx="4" fill="#5a4836" opacity="0.6"/>
  <g stroke="#46382b" stroke-width="1" opacity="0.5">
    <line x1="100" y1="352" x2="500" y2="352"/>
    <line x1="100" y1="358" x2="500" y2="358"/>
  </g>
</svg>
