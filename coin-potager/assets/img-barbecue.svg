<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Barbecue et cuisine extérieure">
  <defs>
    <linearGradient id="bg-bbq" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c0654a"/>
      <stop offset="1" stop-color="#7a3a24"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-bbq)"/>
  <circle cx="520" cy="70" r="130" fill="#ffffff" opacity="0.05"/>
  <circle cx="80" cy="350" r="80" fill="#ffffff" opacity="0.06"/>
  <!-- flammes -->
  <g fill="#d99a3a" opacity="0.9">
    <path d="M260 220 q-10 -40 0 -70 q12 22 4 70 Z"/>
    <path d="M285 225 q-6 -50 8 -80 q14 28 -2 80 Z"/>
    <path d="M310 220 q2 -38 -6 -65 q16 26 6 65 Z"/>
    <path d="M272 230 q-14 -30 -2 -55 q10 20 2 55 Z" opacity="0.6"/>
    <path d="M300 228 q10 -28 2 -52 q12 18 -2 52 Z" opacity="0.6"/>
  </g>
  <!-- cuve du barbecue -->
  <ellipse cx="285" cy="245" rx="90" ry="20" fill="#46382b"/>
  <path d="M195 245 Q195 310 285 310 Q375 310 375 245 Z" fill="#3a2e22"/>
  <!-- grille -->
  <g stroke="#d99a3a" stroke-width="4" opacity="0.8">
    <line x1="210" y1="250" x2="360" y2="250"/>
    <line x1="210" y1="262" x2="360" y2="262"/>
    <line x1="225" y1="238" x2="225" y2="274"/>
    <line x1="255" y1="234" x2="255" y2="276"/>
    <line x1="285" y1="233" x2="285" y2="277"/>
    <line x1="315" y1="234" x2="315" y2="276"/>
    <line x1="345" y1="238" x2="345" y2="274"/>
  </g>
  <!-- pieds -->
  <g stroke="#46382b" stroke-width="10" stroke-linecap="round">
    <line x1="230" y1="310" x2="200" y2="390"/>
    <line x1="340" y1="310" x2="370" y2="390"/>
    <line x1="285" y1="310" x2="285" y2="390"/>
  </g>
  <!-- barre de stabilisation -->
  <line x1="208" y1="360" x2="362" y2="360" stroke="#46382b" stroke-width="8" stroke-linecap="round"/>
  <!-- fumée -->
  <g fill="none" stroke="#f6f1e7" stroke-width="3" opacity="0.25" stroke-linecap="round">
    <path d="M250 210 q-12 -20 0 -40"/>
    <path d="M285 200 q-14 -22 2 -44"/>
    <path d="M318 208 q-10 -18 2 -36"/>
  </g>
  <!-- fourchette -->
  <g transform="translate(430,160) rotate(30)" stroke="#f6f1e7" stroke-width="7" fill="none" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="120"/>
    <line x1="-12" y1="0" x2="-12" y2="40"/>
    <line x1="12" y1="0" x2="12" y2="40"/>
    <path d="M-12 40 Q0 55 12 40"/>
  </g>
</svg>
